<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RedLink Splash</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4b4b,#ff7b7b);
overflow:hidden;
color:white;
}

/* decorative circles */

.circle{
position:absolute;
border-radius:50%;
opacity:0.3;
}

.c1{
width:400px;
height:400px;
background:white;
top:-150px;
left:-150px;
}

.c2{
width:300px;
height:300px;
background:white;
bottom:-120px;
right:-120px;
}

.c3{
width:200px;
height:200px;
background:white;
bottom:-60px;
left:-60px;
}

/* container */

.container{
text-align:center;
z-index:10;
padding:20px;
}

/* logo */

.logo{
width:180px;
animation:float 3s ease-in-out infinite;
filter:drop-shadow(0 10px 25px rgba(0,0,0,0.2));
}

/* title */

h1{
margin-top:25px;
font-weight:700;
letter-spacing:1px;
font-size:28px;
}

p{
margin-top:8px;
opacity:0.9;
}

/* loading bar */

.loader{
width:200px;
height:6px;
background:rgba(255,255,255,0.3);
border-radius:20px;
margin:25px auto 0;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:white;
animation:load 5s linear forwards;
}

/* animations */

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}

}

@keyframes load{

0%{width:0%;}
100%{width:100%;}

}

</style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="container">

<img class="logo"
src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png">

<h1>WE DONATE</h1>

<p>Trusted partner for safe blood donation</p>

<div class="loader">
<div class="progress"></div>
</div>

</div>

<script>

/* redirect after 5 seconds */

setTimeout(function(){

window.location.href="splash.html"

},5000)

</script>

</body>
</html>
