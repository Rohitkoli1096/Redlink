<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedLink Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f5f6f8;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:420px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:center;
position:relative;
margin-bottom:15px;
}

.back{
position:absolute;
left:0;
font-size:22px;
cursor:pointer;
}

.title{
font-size:22px;
font-weight:700;
}

/* HERO IMAGE */

.hero img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

/* TEXT */

.welcome{
text-align:center;
margin:20px 0;
}

.welcome h1{
font-size:32px;
font-weight:700;
margin-bottom:8px;
}

.welcome p{
color:#6b7280;
font-size:15px;
line-height:1.5;
}

/* ROLE TOGGLE */

.toggle{
background:#f4e6e6;
border-radius:14px;
display:flex;
padding:4px;
margin:20px 0;
}

.toggle button{
flex:1;
border:none;
background:none;
padding:12px;
font-size:15px;
border-radius:10px;
cursor:pointer;
}

.toggle .active{
background:white;
color:#e53935;
font-weight:600;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* INPUT */

.input-group{
margin-bottom:16px;
}

.input-group label{
font-size:14px;
font-weight:500;
}

.input{
margin-top:6px;
background:#f1f5f9;
border-radius:12px;
padding:14px;
border:1px solid #e5e7eb;
}

.input input{
width:100%;
border:none;
background:none;
outline:none;
font-size:15px;
color:#374151;
}

/* PASSWORD ROW */

.password-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.forgot{
color:#ef4444;
font-size:14px;
cursor:pointer;
}

/* BUTTON */

.signin{
width:100%;
background:#ef4444;
border:none;
padding:16px;
border-radius:14px;
color:white;
font-size:16px;
font-weight:600;
margin-top:10px;
cursor:pointer;
box-shadow:0 8px 18px rgba(239,68,68,0.3);
}

/* DIVIDER */

.divider{
display:flex;
align-items:center;
gap:10px;
margin:25px 0;
color:#6b7280;
font-size:14px;
}

.divider::before,
.divider::after{
content:"";
flex:1;
height:1px;
background:#e5e7eb;
}

/* SOCIAL BUTTONS */

.social{
display:flex;
gap:12px;
}

.social button{
flex:1;
padding:14px;
border-radius:12px;
border:1px solid #e5e7eb;
background:white;
cursor:pointer;
font-size:15px;
}

/* CREATE ACCOUNT */

.create{
text-align:center;
margin:20px 0;
font-size:15px;
}

.create span{
color:#ef4444;
font-weight:600;
cursor:pointer;
}

/* TOAST */

.toast{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:10px 18px;
border-radius:20px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="back" onclick="goBack()">←</div>
<div class="title">RedLink</div>
</div>

<div class="hero">
<img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=800">
</div>

<div class="welcome">
<h1>Welcome Back</h1>
<p>Your health information, secured and accessible</p>
</div>

<div class="toggle">
<button class="active" onclick="setRole(this)">Patient</button>
<button onclick="setRole(this)">Provider</button>
</div>

<form onsubmit="login(event)">

<div class="input-group">
<label>Email Address</label>
<div class="input">
<input type="email" id="email" placeholder="name@healthcare.com" required>
</div>
</div>

<div class="input-group">

<div class="password-row">
<label>Password</label>
<div class="forgot" onclick="forgot()">Forgot?</div>
</div>

<div class="input">
<input type="password" id="password" placeholder="••••••••" required>
</div>

</div>

<button class="signin">Sign In</button>

</form>

<div class="divider">Or continue with</div>

<div class="social">
<button onclick="social('Google')">Google</button>
<button onclick="social('Apple')">Apple</button>
</div>

<div class="create">
Don't have an account? <span onclick="create()">Create Account</span>
</div>

</div>

<div class="toast" id="toast"></div>

<script>

function showToast(msg){
let t=document.getElementById("toast")
t.innerText=msg
t.classList.add("show")

setTimeout(()=>{
t.classList.remove("show")
},2000)
}

function setRole(btn){
document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

/* LOGIN SYSTEM */

function login(e){

e.preventDefault()

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let user=JSON.parse(localStorage.getItem("user"))

if(!user){

showToast("No account found. Please register.")
return

}

if(email===user.email && password===user.password){

showToast("Login Successful")

setTimeout(()=>{
window.location.href="dashboard.html"
},1200)

}else{

showToast("Invalid email or password")

}

}

/* OTHER FUNCTIONS */

function forgot(){
showToast("Password recovery coming soon")
}

function social(name){
showToast("Redirecting to "+name+" login not Available")
}

function create(){

showToast("Opening registration page")

setTimeout(()=>{
window.location.href="register.html"
},1200)

}

function goBack(){
window.location.href="index2.html"
}

</script>

</body>
</html>
