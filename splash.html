<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#ffffff;
height:100vh;
overflow:hidden;
}

/* SLIDES */

.slide{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
transition:0.4s;
}

.slide img{
width:230px;
margin-bottom:30px;
}

.title{
font-size:24px;
font-weight:700;
margin-bottom:10px;
}

.subtitle{
font-size:15px;
color:#6b7280;
max-width:300px;
line-height:1.5;
}

/* SKIP */

.skip{
position:absolute;
top:20px;
right:20px;
font-size:15px;
color:#6b7280;
cursor:pointer;
}

/* BOTTOM */

.bottom{
position:absolute;
bottom:40px;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
}

.dots{
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
background:#d1d5db;
border-radius:10px;
}

.active{
background:#ef4444;
width:18px;
}

.next{
font-size:15px;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="skip" onclick="skip()">Skip</div>

<!-- SLIDE 1 -->

<div class="slide" id="slide1">

<img src="https://static.vecteezy.com/system/resources/previews/060/024/661/non_2x/man-sitting-in-chair-with-medical-drip-nurse-collecting-blood-from-donor-vector.jpg">
<div class="title">WE DONATE</div>

<div class="subtitle">
Trusted partner for safe blood donation
</div>

</div>

<!-- SLIDE 2 -->

<div class="slide" id="slide2" style="left:100%">

<img src="https://static.vecteezy.com/system/resources/previews/008/190/860/non_2x/human-blood-donate-on-white-background-free-vector.jpg">

<div class="title">Welcome to WE DONATE</div>

<div class="subtitle">
Join the fastest way to request or donate blood anytime, anywhere.
</div>

</div>

<!-- SLIDE 3 -->

<div class="slide" id="slide3" style="left:200%">

<img src="https://kchospital.in/wp-content/uploads/2022/11/illustration-person-donating-blood_23-2148236971-e1667615271205.webp">

<div class="title">Track your Donor 🩸</div>

<div class="subtitle">
Track your donor's location and know the estimated time to arrive
</div>

</div>

<!-- BOTTOM -->

<div class="bottom">

<div class="dots">
<div class="dot active" id="d1"></div>
<div class="dot" id="d2"></div>
<div class="dot" id="d3"></div>
</div>

<div class="next" onclick="nextSlide()">Next Step ></div>

</div>

<script>

let current=1

function nextSlide(){

if(current<3){
current++

document.getElementById("slide1").style.left=(1-current)*100+"%"
document.getElementById("slide2").style.left=(2-current)*100+"%"
document.getElementById("slide3").style.left=(3-current)*100+"%"

updateDots()

}else{

window.location.href="index2.html"

}

}

function updateDots(){

document.getElementById("d1").classList.remove("active")
document.getElementById("d2").classList.remove("active")
document.getElementById("d3").classList.remove("active")

document.getElementById("d"+current).classList.add("active")

}

function skip(){
window.location.href="index2.html"
}

</script>

</body>
</html>
